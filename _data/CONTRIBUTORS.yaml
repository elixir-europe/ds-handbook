# Directory of contributors. The page-level frontmatter `contributors:`
# (in each Markdown file) is the source of truth for *which role* a person took on a specific chapter. This file holds the per-person metadata (avatar source, ORCID, affiliation) plus optional project-level CRediT roles for people whose contribution is to the handbook as a whole rather than to specific pages (project leads, funders, supervisors, designers/developers, etc.).

